---
- name: 02 - Configure RAID using CIMC CLI over SSH
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../cimc_vars.yml
  tasks:
    - name: Refuse to run RAID changes unless explicitly enabled
      ansible.builtin.assert:
        that:
          - raid_config.apply | bool
        fail_msg: >
          raid_config.apply is false. Edit cimc_vars.yml and set raid_config.apply: true
          only when you are ready to make destructive storage changes.

    - name: Run RAID automation helper
      ansible.builtin.command:
        argv:
          - python3
          - ../scripts/cimc_cli.py
          - raid
          - --inventory
          - ../inventory.yml
          - --vars
          - ../cimc_vars.yml
      register: raid_cli
      changed_when: true

    - name: Display RAID helper output
      ansible.builtin.debug:
        var: raid_cli.stdout
