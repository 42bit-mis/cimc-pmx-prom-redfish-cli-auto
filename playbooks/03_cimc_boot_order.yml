---
- name: 03 - Configure persistent boot order using CIMC CLI
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../cimc_vars.yml
  tasks:
    - name: Refuse to run boot changes unless explicitly enabled
      ansible.builtin.assert:
        that:
          - boot_order.apply | bool
        fail_msg: >
          boot_order.apply is false. Edit cimc_vars.yml and set boot_order.apply: true
          when you are ready to change persistent BIOS boot order.

    - name: Run boot-order automation helper
      ansible.builtin.command:
        argv:
          - python3
          - ../scripts/cimc_cli.py
          - boot
          - --inventory
          - ../inventory.yml
          - --vars
          - ../cimc_vars.yml
      register: boot_cli
      changed_when: true

    - name: Display boot helper output
      ansible.builtin.debug:
        var: boot_cli.stdout
